<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Высокооплачиваемая работа</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body>
    <div class="container">
        <!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>

        <h1>Высокооплачиваемая работа</h1>
        <p>Ты попал сюда, потому что тебе приказали. Твой Босс делает тебе предложение, которое даст тебе много денег
            Но при этом, он даёт тебе выбор уйти от сюда. Что выбрать?
        </p>
        <p style="color: red; font-size: 24px; font-weight: bold; text-align: center;">
  Осталось времени: <span id="timerText">5</span> сек!
</p>

        <div class="choices">
            <a href="street.html" class="choice">
                <img src="https://img.freepik.com/premium-photo/buildings-city_1048944-9762166.jpg?semt=ais_hybrid&w=740" alt="Уйти с работы">
                <span>Уйти с работы</span>
            </a>
            <a href="money.html" class="choice">
                <img src="https://media.graphassets.com/resize=width:1920,height:800/j2jpLyx0SLSuacYfZVX8"
                    alt="Принять предложение">
                <span>Принять предложение</span>
            </a>
        </div>
    </div>

    <audio id="bgMusic" loop>
  <source
    src="music\Mega Man—Cut Man.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

<script>
  // Как только игрок попадает на эту страницу, у него отнимается 30 HP
  takeDamage(30);
  // Допишите через alert() сообщение, что он потерял здоровье:
  alert("Это была плохая идея!");
</script>

<script>
  const timerText = document.getElementById("timerText");
  let timeLeft = 5; // Время в секундах
 
  // setInterval вызывает указанную функцию каждый 1000 миллисекунд (1 секунду)
  const countdown = setInterval(() => {
    timeLeft--; // Уменьшаем время на 1
    timerText.innerText = timeLeft; // Показываем на экране
 
    // Если время вышло
    if (timeLeft <= 0) {
      clearInterval(countdown); // Останавливаем работу таймера, чтобы не ушел в минус
      alert("Ну зачем быть таким медленным... Теперь вас похитила девушка.");
      takeDamage(100); // Смертельный урон из нашей прошлой механики!
      // или просто window.location.href = 'trap.html';
    }
  }, 1000); // 1000 мс = 1 секунда
</script>


</body>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выход от из замка</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body>
    <div class="container">
        <!-- Контейнер для шкалы здоровья -->
<div
  style="width: 100%; background-color: #555; border-radius: 10px; margin-bottom: 20px;"
>
  <!-- Сама "живая" полоска. id нужен для управления шириной из JS -->
  <div
    id="hpBar"
    style="width: 100%; height: 20px; background-color: #32CD32; border-radius: 10px; transition: width 0.3s; text-align: center; color: white; font-size: 14px; font-weight: bold; line-height: 20px;"
  >
    100%
  </div>
</div>

        <h1>Выход из замка</h1>
        <p>Молодец! Ты почти справился сразу же. Выход прямо перед тобой. Но его защищают охранники. На против них, в другом конце комнаты, есть большая сова. Её можно освободить. Что выберешь? 
        </p>
        <div class="choices">
            <a href="save.html" class="choice">
                <img src="https://i.ytimg.com/vi/bMcMZ5xtx1U/maxresdefault.jpg" alt="Сова">
                <span>Сова</span>
            </a>
            <a href="execute.html" class="choice">
                <img src="https://avatars.mds.yandex.net/i?id=7d656a24f0175f4494e1950a5b749c21_l-10707439-images-thumbs&n=13"
                    alt="Охранники">
                <span>Охранники</span>
            </a>
        </div>
    </div>

    <audio id="bgMusic" loop>
  <source
    src="music\Mega Man—Cut Man.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

<script>
  // Как только игрок попадает на эту страницу, у него отнимается 30 HP
  takeDamage(30);
  // Допишите через alert() сообщение, что он потерял здоровье:
  alert("Это была плохая идея!");
</script>


</body>

</html>

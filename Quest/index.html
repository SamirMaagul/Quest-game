<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сможешь найти счастье?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body>
    <div class="container">
        <h1>Сборник юмора</h1>
        <div class="choices">
            <a href="main-1.html" class="choice">
                <!-- Картинка леса -->
                <img src="https://i.pinimg.com/originals/2c/ae/11/2cae11df117055a87720156b8482de59.jpg" alt="Поиск счастья">
                <span>Поиск счастья</span>
            </a>
            <a href="main-2.html" class="choice">
                <!-- Картинка пещеры -->
                <img src="https://avatars.mds.yandex.net/i?id=b10820f66865d960ace0effcb7a0ff24_l-10811933-images-thumbs&n=13" alt="Побег из замка">
                <span>Побег из замка</span>
            </a>
        </div>
    </div>
    <!-- Тег audio загружает звуковой файл. 
     Атрибут loop заставляет музыку играть по кругу. 
     Атрибут id нужен, чтобы мы могли обращаться к элементу из JavaScript -->
<audio id="bgMusic" loop>
  <source
    src="music\Mega Man—Cut Man.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

</body>

</html>

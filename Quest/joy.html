<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счастье найдено!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
</head>

<body>
    <div class="container">
        <h1>Счастье найдено!</h1>
        <p>Ты смог найти счастье в таких незаметных вещах. Ты молодец! 
            Теперь ты можешь радоваться своей жизнью, и быть счастливым до конца своих дней!
        </p>
        <div class="choices">
            <a href="index.html" class="choice">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Saw-Whet_Owl%2C_Evening_%2826643004132%29.jpg/1280px-Saw-Whet_Owl%2C_Evening_%2826643004132%29.jpg" alt="Играть снова">
                <span>Играть снова</span>
            </a>
        </div>
    </div>
    <audio id="bgMusic" loop>
  <source
    src="music\Mega Man—Cut Man.mp3"
    type="audio/mpeg"
  />
</audio>

<!-- Кнопка для управления звуком. По умолчанию звук считаем выключенным до действий пользователя -->
<button id="muteBtn" class="mute-button">🔇 Звук выключен</button>

<!-- Подключаем наш будущий файл с логикой JavaScript -->
<script src="script.js"></script>

    <script>
  // Получаем текущее количество побед из памяти. Если значения нет, устанавливаем 0
  // Поскольку localStorage отдает строку, используем parseInt для перевода в число
  let wins = parseInt(localStorage.getItem("questWins")) || 0;
 
  // Увеличиваем показатель побед на 1
  wins += 1;
 
  // Перезаписываем обновленное число обратно в localStorage
  localStorage.setItem("questWins", wins);
</script>
</body>

</html>
